name: Deploy Frontend Stage to VPS

on:
  push:
    branches:
      - stage
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: "20"
  APP_PATH: "./coursing_react_dashboard"
  DOCKERFILE_PATH: "./coursing_react_dashboard/Dockerfile"
  BUILD_CONTEXT: "./coursing_react_dashboard"
  COMPOSE_FILE_PATH: "coursing_react_dashboard/docker-compose.yml"
  DEPLOY_PATH: "/srv/projects/coursing_app/stage/front_end/"

jobs:
  deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: ${{ env.APP_PATH }}/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: ${{ env.APP_PATH }}
        run: yarn install --frozen-lockfile

      - name: Build
        working-directory: ${{ env.APP_PATH }}
        run: yarn build

      - name: Set Docker image name
        shell: bash
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          IMAGE_TAG="stage-latest"

          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Copy Docker Compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: ${{ env.COMPOSE_FILE_PATH }}
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 1

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            mkdir -p "${{ env.DEPLOY_PATH }}"
            cd "${{ env.DEPLOY_PATH }}"

            cat > .env <<EOF
            IMAGE_NAME=${{ env.IMAGE_NAME }}
            IMAGE_TAG=${{ env.IMAGE_TAG }}
            EOF

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -af
